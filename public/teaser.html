<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טיזר מחר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Heebo',sans-serif;
  background:#111;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}

.card {
  width:480px; height:560px;
  background:linear-gradient(180deg,#041a10 0%,#062e24 40%,#085041 100%);
  border-radius:28px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}

/* מוט וילון */
.rod {
  position:absolute; top:0; left:0; right:0; height:16px; z-index:10;
  background:linear-gradient(90deg,#5a3a08,#c87d20,#f5c252,#EF9F27,#c87d20,#5a3a08);
  box-shadow:0 4px 14px rgba(0,0,0,0.6);
}
.rod::after {
  content:'';
  position:absolute; top:4px; left:0; right:0; height:5px;
  background:repeating-linear-gradient(90deg, transparent 0, transparent 22px, rgba(0,0,0,0.25) 22px, rgba(0,0,0,0.25) 26px);
}

/* וילון שמאל — נפתח שמאלה */
.curtain-l {
  position:absolute;
  top:0; left:0;
  width:50%; height:100%;
  z-index:4;
  background:linear-gradient(105deg,
    #030e08 0%,
    #041a10 20%,
    #062e24 45%,
    #052818 65%,
    #041a10 80%,
    #030e08 100%
  );
  transform-origin: left center;
  clip-path: polygon(0 0, 100% 0, 72% 100%, 0 100%);
  box-shadow: 6px 0 30px rgba(0,0,0,0.6), inset -10px 0 30px rgba(0,0,0,0.4);
}
/* קפלים */
.curtain-l::before { content:''; position:absolute; top:0; bottom:0; left:30%; width:3px; background:rgba(255,255,255,0.04); }
.curtain-l::after  { content:''; position:absolute; top:0; bottom:0; left:60%; width:2px; background:rgba(255,255,255,0.03); }

/* וילון ימין — נפתח ימינה */
.curtain-r {
  position:absolute;
  top:0; right:0;
  width:50%; height:100%;
  z-index:4;
  background:linear-gradient(255deg,
    #030e08 0%,
    #041a10 20%,
    #062e24 45%,
    #052818 65%,
    #041a10 80%,
    #030e08 100%
  );
  transform-origin: right center;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 28% 100%);
  box-shadow: -6px 0 30px rgba(0,0,0,0.6), inset 10px 0 30px rgba(0,0,0,0.4);
}
.curtain-r::before { content:''; position:absolute; top:0; bottom:0; right:30%; width:3px; background:rgba(255,255,255,0.04); }
.curtain-r::after  { content:''; position:absolute; top:0; bottom:0; right:60%; width:2px; background:rgba(255,255,255,0.03); }

/* אפקט בד — גבולות גל */
.curtain-l-edge {
  position:absolute; top:0; right:0; bottom:0; width:18px; z-index:5;
  background:linear-gradient(90deg, transparent, rgba(0,0,0,0.3));
}

/* אור בימה */
.stage-light {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:220px; height:100%;
  background:radial-gradient(ellipse at 50% 10%, rgba(93,202,165,0.1) 0%, transparent 65%);
  z-index:1;
}

/* עדן */
.eden-wrap {
  position:absolute;
  bottom:0; left:50%; transform:translateX(-50%);
  z-index:3; width:210px;
}
.eden-wrap img {
  width:100%; display:block;
  filter:brightness(1.05) drop-shadow(0 0 24px rgba(93,202,165,0.25));
  mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 8%, black 22%);
  -webkit-mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 8%, black 22%);
}

/* טקסט — למעלה */
.text-block {
  position:relative; z-index:10;
  text-align:center;
  padding:26px 28px 0;
  width:100%;
}
.eyes { font-size:30px; margin-bottom:10px; display:block; }
.main-text {
  font-size:40px; font-weight:900; color:white;
  line-height:1.2; margin-bottom:14px;
}
.main-text span { color:#5DCAA5; }
.sub-text {
  font-size:19px; font-weight:300;
  color:rgba(255,255,255,0.75);
  line-height:1.7; margin-bottom:14px;
}
.sign {
  font-size:15px; color:rgba(255,255,255,0.4);
}
.sign strong { color:#5DCAA5; font-weight:700; }
</style>
</head>
<body>
<div class="card">
  <div class="rod"></div>
  <div class="curtain-l"></div>
  <div class="curtain-r"></div>
  <div class="stage-light"></div>
  <div class="eden-wrap">
    <img src="screenshots/eden.png" alt="עדן">
  </div>
  <div class="text-block">
    <span class="eyes">👀</span>
    <div class="main-text">מחר. <span>19:30.</span></div>
    <div class="sub-text">
      שוק ההון, ריבית דריבית,<br>
      ומישהי שמחכה לפגוש אתכן.
    </div>
    <div class="sign">להתראות! 💚 &nbsp;·&nbsp; <strong>שרון</strong></div>
  </div>
</div>
</body>
</html>
