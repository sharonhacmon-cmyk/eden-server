<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פאנל ניהול — שוק הווירטואלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07071A;--card:#0F0F2E;--purple:#7C5CFC;--gold:#FFD700;--green:#00E676;--red:#FF5252;--text:#EEEEFF;--dim:rgba(238,238,255,0.5);--border:rgba(124,92,252,0.3)}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px}
.title{font-size:24px;font-weight:900;margin-bottom:4px}
.sub{font-size:14px;color:var(--dim);margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;overflow-x:auto}
.stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:rgba(124,92,252,0.1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:900}
.stat-lbl{font-size:13px;color:var(--dim);margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:right;padding:10px 8px;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.05);white-space:nowrap}
.up{color:var(--green)}.dn{color:var(--red)}
.btn-sm{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600}
.btn-red{background:rgba(255,82,82,0.2);color:var(--red);border:1px solid rgba(255,82,82,0.4)}
.btn-blue{background:rgba(64,196,255,0.15);color:#40C4FF;border:1px solid rgba(64,196,255,0.3)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1A1A4A;border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;z-index:500;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--green)}.toast.err{color:var(--red)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
  <div style="font-size:36px">🔧</div>
  <div>
    <div class="title">פאנל ניהול — שוק הווירטואלי</div>
    <div class="sub">מבט כולל על כל המשתתפים</div>
  </div>
  <button onclick="loadData()" style="margin-right:auto;padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--purple);font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer">רענן ↺</button>
</div>

<div class="stat-row" id="statsRow">
  <div class="stat"><div class="stat-val" id="s-players">—</div><div class="stat-lbl">משתתפים</div></div>
  <div class="stat"><div class="stat-val" id="s-trades">—</div><div class="stat-lbl">עסקאות</div></div>
  <div class="stat"><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">ממוצע תיק</div></div>
  <div class="stat"><div class="stat-val" id="s-profit">—</div><div class="stat-lbl">מרוויחים</div></div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>שם</th>
        <th>מגדר</th>
        <th>מזומן</th>
        <th>שווי תיק</th>
        <th>סה"כ</th>
        <th>רווח/הפסד</th>
        <th>עסקאות</th>
        <th>פעולות</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--dim)">טוען...</td></tr>
    </tbody>
  </table>
</div>

<script>
const params = new URLSearchParams(location.search);
const PW = params.get('pw') || prompt('סיסמת אדמין:');
if (!PW) { document.body.innerHTML = '<div style="padding:40px;color:#ff5252;font-size:20px">גישה נדחתה</div>'; }

const STARTING_CASH = 50000;

function fmt(n) {
  const sign = n < 0 ? '-' : '';
  return sign + '₪' + Math.abs(Math.round(n)).toLocaleString('he-IL');
}

const GENDER_LABEL = { female:'בת', male:'בן', other:'אחר' };

async function adminApi(path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json','x-admin-password': PW } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

async function loadData() {
  const [allPlayers, prices] = await Promise.all([
    adminApi('/admin/trading/all'),
    fetch('/api/stocks').then(r=>r.json()).catch(()=>({}))
  ]);

  if (allPlayers.error) {
    showToast('שגיאת גישה — בדוק סיסמה', 'err');
    return;
  }

  const players = Object.entries(allPlayers).map(([code, p]) => {
    // חישוב שווי תיק לפי מחירים עדכניים (או avgPrice אם אין)
    let portfolioVal = 0;
    Object.entries(p.portfolio || {}).forEach(([sym, h]) => {
      const price = prices[sym]?.price || h.avgPrice;
      portfolioVal += price * h.shares;
    });
    const total  = p.cash + portfolioVal;
    const profit = total - STARTING_CASH;
    return { code, ...p, portfolioVal, total, profit };
  });

  // סטטיסטיקות
  document.getElementById('s-players').textContent = players.length;
  const totalTrades = players.reduce((s,p) => s + (p.trades||[]).length, 0);
  document.getElementById('s-trades').textContent = totalTrades;

  if (players.length) {
    const avg = players.reduce((s,p) => s + p.total, 0) / players.length;
    document.getElementById('s-avg').textContent = fmt(avg);
    const profiting = players.filter(p => p.profit > 0).length;
    document.getElementById('s-profit').textContent = profiting + '/' + players.length;
  }

  // מיון לפי תשואה
  players.sort((a,b) => b.profit - a.profit);

  const body = document.getElementById('tableBody');
  body.innerHTML = players.map((p, i) => {
    const up = p.profit >= 0;
    const pct = ((p.profit / STARTING_CASH) * 100).toFixed(1);
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${p.name}</strong></td>
      <td>${GENDER_LABEL[p.gender] || '—'}</td>
      <td>${fmt(p.cash)}</td>
      <td>${fmt(p.portfolioVal)}</td>
      <td><strong>${fmt(p.total)}</strong></td>
      <td class="${up?'up':'dn'}">${up?'+':''}${fmt(p.profit)} (${up?'+':''}${pct}%)</td>
      <td>${(p.trades||[]).length}</td>
      <td>
        <button class="btn-sm btn-blue" onclick="resetPlayer('${p.code}','${p.name}')">איפוס</button>
        &nbsp;
        <button class="btn-sm btn-red" onclick="deletePlayer('${p.code}','${p.name}')">מחק</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--dim)">אין משתתפים עדיין</td></tr>';
}

async function resetPlayer(code, name) {
  if (!confirm(`לאפס את ${name}? כל הנתונים יימחקו!`)) return;
  const r = await adminApi(`/admin/trading/reset/${code}`, 'POST');
  if (r.ok) { showToast(`${name} אופס ✅`, 'ok'); loadData(); }
  else showToast(r.error || 'שגיאה', 'err');
}

async function deletePlayer(code, name) {
  if (!confirm(`למחוק את ${name} לצמיתות?`)) return;
  const r = await adminApi(`/admin/trading/players/${code}`, 'DELETE');
  if (r.ok) { showToast(`${name} נמחק ✅`, 'ok'); loadData(); }
  else showToast(r.error || 'שגיאה', 'err');
}

let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

if (PW) loadData();
</script>
</body>
</html>
