<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#062e24"/>
      <stop offset="55%" style="stop-color:#085041"/>
      <stop offset="100%" style="stop-color:#0d6b57"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D9E75"/>
      <stop offset="100%" style="stop-color:#085041"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="400" fill="#1D9E75" opacity="0.06"/>
  <circle cx="1100" cy="1100" r="350" fill="#EF9F27" opacity="0.07"/>

  <!-- Free badge -->
  <rect x="40" y="40" width="240" height="60" rx="30" fill="#EF9F27"/>
  <text x="160" y="78" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#062e24" text-anchor="middle">חינמי לחלוטין ✦</text>

  <!-- Tag pill -->
  <rect x="350" y="130" width="500" height="60" rx="30" fill="rgba(239,159,39,0.18)" stroke="#EF9F27" stroke-width="2" opacity="0.8"/>
  <text x="600" y="168" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#FAC775" text-anchor="middle">וובינר · 21 באפריל 2026</text>

  <!-- Nativ Logo -->
  <circle cx="600" cy="380" r="180" fill="#085041"/>
  <circle cx="600" cy="380" r="158" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.4"/>
  <!-- Path in logo -->
  <path d="M 480 490 Q 510 450 545 420 Q 580 390 620 365 Q 648 348 675 335" fill="none" stroke="#5DCAA5" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <circle cx="480" cy="490" r="9" fill="#9FE1CB" opacity="0.6"/>
  <circle cx="545" cy="420" r="10" fill="#5DCAA5" opacity="0.8"/>
  <circle cx="620" cy="365" r="11" fill="#1D9E75"/>
  <circle cx="675" cy="335" r="16" fill="#EF9F27"/>
  <circle cx="675" cy="335" r="9" fill="#FAC775"/>
  <!-- Logo text -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#E1F5EE" text-anchor="middle">נתיב</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#EF9F27" text-anchor="middle">הכסף החכם שלך</text>

  <!-- Main headline -->
  <text x="600" y="660" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle">הכירי את</text>
  <text x="600" y="760" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#EF9F27" text-anchor="middle">עדן</text>
  <text x="600" y="860" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle">המדריכה שלך</text>

  <!-- Sub text -->
  <text x="600" y="940" font-family="Arial, sans-serif" font-size="38" font-weight="300" fill="rgba(255,255,255,0.65)" text-anchor="middle">ללמוד פיננסים בלי דאגה, בלי לחץ</text>

  <!-- Detail boxes -->
  <rect x="160" y="990" width="240" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="280" y="1028" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5DCAA5" text-anchor="middle">תאריך</text>
  <text x="280" y="1070" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">21/04/2026</text>

  <rect x="480" y="990" width="240" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="600" y="1028" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5DCAA5" text-anchor="middle">שעה</text>
  <text x="600" y="1070" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">19:30</text>

  <rect x="800" y="990" width="240" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="920" y="1028" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5DCAA5" text-anchor="middle">כניסה</text>
  <text x="920" y="1070" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">חינמית</text>
</svg>
