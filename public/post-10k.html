<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פוסט — 10,000 ₪</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Heebo',sans-serif;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:20px;
  padding:30px 20px;
}

.card {
  width:600px;
  height:600px;
  background:linear-gradient(160deg,#062e24 0%,#085041 55%,#0d6b57 100%);
  border-radius:24px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 44px;
  text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}

.bg-circle1 {
  position:absolute; width:400px; height:400px; border-radius:50%;
  background:rgba(93,202,165,0.06); top:-150px; left:-120px; pointer-events:none;
}
.bg-circle2 {
  position:absolute; width:300px; height:300px; border-radius:50%;
  background:rgba(239,159,39,0.05); bottom:-80px; right:-80px; pointer-events:none;
}

.tag {
  font-size:11px; font-weight:700; letter-spacing:3px;
  color:#5DCAA5; margin-bottom:20px;
  position:relative; z-index:2;
}

.amount {
  font-size:88px; font-weight:900; line-height:1;
  color:#EF9F27;
  position:relative; z-index:2;
  margin-bottom:4px;
}
.amount-sub {
  font-size:22px; font-weight:700; color:rgba(255,255,255,0.5);
  margin-bottom:28px;
  position:relative; z-index:2;
}

.question {
  font-size:28px; font-weight:900; color:white;
  line-height:1.4;
  position:relative; z-index:2;
  margin-bottom:28px;
}
.question span { color:#5DCAA5; }

.options {
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
  position:relative; z-index:2;
}
.option {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50px;
  padding:12px 20px;
  font-size:16px;
  color:rgba(255,255,255,0.85);
  font-weight:400;
}

.brand {
  position:absolute; bottom:22px;
  font-size:12px; font-weight:700; letter-spacing:2px;
  color:rgba(255,255,255,0.25); z-index:2;
}
.brand strong { color:#5DCAA5; }

.download-btn {
  background:#1D9E75; color:white;
  border:none; font-family:'Heebo',sans-serif;
  font-size:15px; font-weight:700;
  padding:12px 28px; border-radius:30px;
  cursor:pointer; transition:background 0.2s;
}
.download-btn:hover { background:#085041; }
.download-btn:disabled { background:#555; cursor:default; }
</style>
</head>
<body>

<div class="card" id="post">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>

  <div class="tag">נתיב · הכסף החכם שלך</div>
  <div class="amount">₪10,000</div>
  <div class="amount-sub">פנויים להשקעה</div>

  <div class="question">
    מה היית עושה איתם?<br>
    <span>ספרי לי בתגובות 👇</span>
  </div>

  <div class="options">
    <div class="option">💰 מכניסה לחיסכון / פיקדון</div>
    <div class="option">📈 משקיעה בשוק ההון</div>
    <div class="option">🛍️ מוציאה על משהו שרוצה כבר זמן</div>
    <div class="option">🤷 לא יודעת — לזה אני כאן!</div>
  </div>

  <div class="brand">שרון חכמון · <strong>נתיב</strong></div>
</div>

<button class="download-btn" id="dl-btn" onclick="download()">⬇️ הורידי תמונה</button>

<script>
async function download() {
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.textContent = '⏳ מכינה...';
  const el = document.getElementById('post');
  const canvas = await html2canvas(el, { scale:2, useCORS:true, backgroundColor:null });
  const link = document.createElement('a');
  link.download = 'פוסט-10000.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  btn.textContent = '✅ הורד!';
  setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇️ הורידי תמונה'; }, 2000);
}
</script>
</body>
</html>
