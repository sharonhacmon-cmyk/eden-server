<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תמונה לפוסט שאלה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #111;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .hint { color: #5DCAA5; font-size: 15px; font-weight: 700; text-align: center; }

  .slide {
    width: 540px;
    height: 540px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 44px;
    background: linear-gradient(160deg, #062e24 0%, #085041 55%, #0d6b57 100%);
  }
  .slide::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #1D9E75;
    opacity: 0.07;
    top: -200px; left: -200px;
  }
  .slide::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #EF9F27;
    opacity: 0.06;
    bottom: -150px; right: -150px;
  }

  .top-tag {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #5DCAA5;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }

  .question-icon {
    font-size: 52px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: white;
    line-height: 1.4;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }
  h1 span { color: #EF9F27; }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    position: relative;
    z-index: 2;
    margin-bottom: 22px;
  }
  .option {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: right;
  }
  .option-letter {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(239,159,39,0.2);
    border: 1px solid rgba(239,159,39,0.4);
    color: #FAC775;
    font-size: 12px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .cta {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    position: relative;
    z-index: 2;
  }
  .cta strong { color: #5DCAA5; }

  .brand {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.18);
    z-index: 2;
    white-space: nowrap;
  }

  .download-btn {
    background: #1D9E75;
    color: white;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 30px;
    cursor: pointer;
    width: 240px;
    text-align: center;
    transition: background 0.2s;
  }
  .download-btn:hover { background: #085041; }
  .download-btn:disabled { background: #555; cursor: default; }
</style>
</head>
<body>

<div class="hint">💬 תמונה לפוסט שאלה | 540×540</div>

<div class="slide" id="sq">
  <div class="top-tag">שאלה אחת קטנה 💚</div>
  <div class="question-icon">🤔</div>
  <h1>מה הדבר הכי מבלבל אותך<br>כשמדברים על<br><span>כסף והשקעות?</span></h1>
  <div class="options">
    <div class="option"><div class="option-letter">א</div>לא יודעת מאיפה להתחיל</div>
    <div class="option"><div class="option-letter">ב</div>לא יודעת על מי לסמוך</div>
    <div class="option"><div class="option-letter">ג</div>זה נראה מסובך מדי בשבילי</div>
    <div class="option"><div class="option-letter">ד</div>אין לי מספיק כסף להשקיע</div>
  </div>
  <div class="cta">כתבי בתגובות — <strong>סקרנית לדעת 😊</strong></div>
  <div class="brand">NATIV · שרון חכמון</div>
</div>
<button class="download-btn" onclick="downloadSlide()">⬇️ הורידי את התמונה</button>

<script>
async function downloadSlide() {
  const btn = event.currentTarget;
  btn.disabled = true;
  btn.textContent = '⏳ מכינה...';
  const el = document.getElementById('sq');
  const canvas = await html2canvas(el, {
    scale: 2, useCORS: true, backgroundColor: null,
    width: el.offsetWidth, height: el.offsetHeight
  });
  const link = document.createElement('a');
  link.download = 'פוסט-שאלה.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  btn.textContent = '✅ הורד!';
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '⬇️ הורידי את התמונה';
  }, 2000);
}
</script>
</body>
</html>
