<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שרון חכמון | נתיב הכסף החכם שלך</title>
  <meta property="og:title" content="שרון חכמון | נתיב הכסף החכם שלך">
  <meta property="og:description" content="כלכלנית עם 25 שנות ניסיון פיננסי. מנגישה ידע לנשים — בשפה פשוטה, בגובה העיניים, בלי דאגה.">
  <meta property="og:image" content="https://eden-server-73ms.onrender.com/sharon.jpeg">
  <meta property="og:url" content="https://eden-server-73ms.onrender.com/card.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      background: #f0e6d0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    a.card-link {
      display: block;
      text-decoration: none;
      color: inherit;
      max-width: 480px;
      width: 100%;
    }

    .card {
      background: #FEFAF4;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(0,0,0,0.18);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
    }

    /* תמונת שרון */
    .photo-wrap {
      position: relative;
      height: 280px;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: linear-gradient(to top, #FEFAF4, transparent);
    }

    /* תוכן */
    .content {
      padding: 24px 28px 32px;
      direction: rtl;
      text-align: right;
    }

    .name {
      font-size: 30px;
      font-weight: 900;
      color: #8B6914;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #B8860B;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .divider {
      width: 50px;
      height: 3px;
      background: linear-gradient(to left, #8B6914, #F2A7BE);
      border-radius: 2px;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 16px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .tagline strong {
      color: #8B6914;
    }

    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #8B6914, #C49A2A);
      color: white;
      font-size: 17px;
      font-weight: 700;
      padding: 15px 30px;
      border-radius: 50px;
      width: 100%;
    }

    .arrow {
      font-size: 20px;
    }
  </style>
</head>
<body>

  <a class="card-link" href="https://eden-server-73ms.onrender.com/prospectus.html" target="_blank">
    <div class="card">

      <div class="photo-wrap">
        <img src="sharon.jpeg" alt="שרון חכמון">
        <div class="photo-overlay"></div>
      </div>

      <div class="content">
        <div class="name">שרון חכמון</div>
        <div class="subtitle">כלכלנית | 25 שנות ניסיון פיננסי</div>
        <div class="divider"></div>
        <div class="tagline">
          מנגישה ידע פיננסי לנשים —<br>
          <strong>בשפה פשוטה, בגובה העיניים, בלי דאגה.</strong>
        </div>
        <div class="cta-btn">
          לכרטיס הביקור המלא שלי
          <span class="arrow">←</span>
        </div>
      </div>

    </div>
  </a>

</body>
</html>
