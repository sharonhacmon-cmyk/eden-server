<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תמונת קבוצת לומדות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #111;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .hint { color: #5DCAA5; font-size: 15px; font-weight: 700; text-align: center; }

  .slide {
    width: 500px;
    height: 500px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 44px;
    background: linear-gradient(160deg, #062e24 0%, #085041 60%, #0d6b57 100%);
  }
  .slide::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #1D9E75;
    opacity: 0.07;
    top: -200px; left: -200px;
  }
  .slide::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #EF9F27;
    opacity: 0.06;
    bottom: -150px; right: -150px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }

  .people {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }
  .person {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .person img {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top center;
  }
  .person img.eden { object-position: center; }
  .person-gold img { border: 3px solid rgba(239,159,39,0.8); }
  .person-green img { border: 3px solid rgba(93,202,165,0.8); }
  .person-name { font-size: 12px; font-weight: 700; color: white; }
  .person-role { font-size: 10px; color: rgba(255,255,255,0.5); }

  h1 {
    font-size: 30px;
    font-weight: 900;
    color: white;
    line-height: 1.35;
    margin-bottom: 10px;
    position: relative;
    z-index: 2;
  }
  h1 span { color: #EF9F27; }

  .sub {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 2;
    margin-bottom: 20px;
  }
  .tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  .brand {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.18);
    z-index: 2;
    white-space: nowrap;
  }

  .download-btn {
    background: #1D9E75;
    color: white;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 30px;
    cursor: pointer;
    width: 240px;
    text-align: center;
    transition: background 0.2s;
  }
  .download-btn:hover { background: #085041; }
  .download-btn:disabled { background: #555; cursor: default; }
</style>
</head>
<body>

<div class="hint">💬 תמונת קבוצת וואטסאפ | לומדות עם שרון ועדן</div>

<div class="slide" id="wg">
  <div class="logo-text">NATIV · נתיב</div>

  <div class="people">
    <div class="person person-gold">
      <img src="screenshots/sharon.jpeg" alt="שרון">
      <div class="person-name">שרון חכמון</div>
      <div class="person-role">מנחה</div>
    </div>
    <div class="person person-green">
      <img src="screenshots/eden.png" alt="עדן" class="eden">
      <div class="person-name">עדן</div>
      <div class="person-role">מדריכת AI</div>
    </div>
  </div>

  <h1>לומדות עם שרון.<br>מתרגלות עם <span>עדן.</span></h1>

  <p class="sub">קהילת נשים שלומדות פיננסים<br>בשפה שלהן, בקצב שלהן.</p>

  <div class="tags">
    <div class="tag">💚 עדן 24/7</div>
    <div class="tag">👩‍🏫 מפגשים עם שרון</div>
    <div class="tag">🤝 קהילה תומכת</div>
  </div>

  <div class="brand">NATIV · שרון חכמון · עדן AI</div>
</div>
<button class="download-btn" onclick="downloadSlide()">⬇️ הורידי את התמונה</button>

<script>
async function downloadSlide() {
  const btn = event.currentTarget;
  btn.disabled = true;
  btn.textContent = '⏳ מכינה...';
  const el = document.getElementById('wg');
  const canvas = await html2canvas(el, {
    scale: 2, useCORS: true, backgroundColor: null,
    width: el.offsetWidth, height: el.offsetHeight
  });
  const link = document.createElement('a');
  link.download = 'קבוצת-לומדות.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  btn.textContent = '✅ הורד!';
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '⬇️ הורידי את התמונה';
  }, 2000);
}
</script>
</body>
</html>
