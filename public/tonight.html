<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הערב נפגשות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Heebo',sans-serif;
  background:#111;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
.card {
  width:480px; height:560px;
  background:linear-gradient(160deg,#062e24 0%,#085041 55%,#0d6b57 100%);
  border-radius:28px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}

/* עיגולי רקע */
.bg-circle1 {
  position:absolute; width:340px; height:340px; border-radius:50%;
  background:rgba(93,202,165,0.07); top:-100px; left:-80px; pointer-events:none;
}
.bg-circle2 {
  position:absolute; width:260px; height:260px; border-radius:50%;
  background:rgba(239,159,39,0.05); bottom:-60px; right:-60px; pointer-events:none;
}

/* טקסט עליון */
.top-block {
  position:relative; z-index:10;
  text-align:center;
  padding:36px 28px 0;
  width:100%;
}
.tag {
  font-size:12px; font-weight:700; letter-spacing:3px;
  color:#5DCAA5; margin-bottom:14px;
}
.main-text {
  font-size:44px; font-weight:900; color:white;
  line-height:1.15; margin-bottom:6px;
}
.main-text span { color:#5DCAA5; }
.sub-text {
  font-size:17px; font-weight:300;
  color:rgba(255,255,255,0.65);
  line-height:1.6; margin-bottom:0;
}

/* שעה */
.time-row {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-top:16px;
}
.time-pill {
  background:rgba(239,159,39,0.15);
  border:1.5px solid rgba(239,159,39,0.5);
  border-radius:50px; padding:10px 28px;
  font-size:28px; font-weight:900; color:#EF9F27;
  letter-spacing:1px;
}

/* עדן */
.eden-wrap {
  position:relative; z-index:5;
  width:200px; flex-shrink:0;
}
.eden-wrap img {
  width:100%; display:block;
  filter:brightness(1.05) drop-shadow(0 0 20px rgba(93,202,165,0.2));
  mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.1) 5%, black 18%);
  -webkit-mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.1) 5%, black 18%);
}

/* כפתור זום */
.zoom-btn {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:50px; padding:12px 28px;
  margin: 0 28px 28px;
  width:calc(100% - 56px);
  text-decoration:none;
  transition:background 0.2s;
}
.zoom-icon {
  font-size:20px;
}
.zoom-text {
  font-size:16px; font-weight:700; color:white;
}
.zoom-text span {
  font-size:13px; font-weight:300; color:rgba(255,255,255,0.55);
  display:block;
}

/* קו מפריד */
.divider {
  width:60px; height:2px;
  background:rgba(93,202,165,0.3);
  border-radius:2px;
  margin:0 auto 4px;
  position:relative; z-index:10;
}
</style>
</head>
<body>
<div class="card">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>

  <div class="top-block">
    <div class="tag">נתיב · שרון חכמון</div>
    <div class="main-text">הערב<br><span>נפגשות.</span></div>
    <div class="sub-text">להכיר את תהליך הלמידה עם שרון ועדן</div>
    <div class="time-row">
      <div class="time-pill">⏰ 19:30</div>
    </div>
  </div>

  <div class="eden-wrap">
    <img src="screenshots/eden.png" alt="עדן">
  </div>

  <div class="divider"></div>
  <div class="zoom-btn">
    <span class="zoom-icon">📹</span>
    <div class="zoom-text">
      קישור לזום מצורף בהודעה
    </div>
  </div>
</div>
</body>
</html>
