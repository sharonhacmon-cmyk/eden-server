<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רקע זום — נתיב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh; overflow:hidden;
  font-family:'Heebo',sans-serif; direction:rtl;
  background:linear-gradient(135deg,#041a10 0%,#062e24 35%,#085041 65%,#0d6b57 100%);
}

.scene {
  width:100%; height:100%;
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 6vw;
  position:relative;
  transform:scaleX(-1);
}

/* רקע */
.bg-circle1 {
  position:absolute; width:50vw; height:50vw; border-radius:50%;
  background:radial-gradient(circle, rgba(93,202,165,0.08) 0%, transparent 70%);
  top:-15vw; right:-10vw; pointer-events:none;
}
.bg-circle2 {
  position:absolute; width:35vw; height:35vw; border-radius:50%;
  background:radial-gradient(circle, rgba(239,159,39,0.06) 0%, transparent 70%);
  bottom:-10vw; left:15vw; pointer-events:none;
}
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(93,202,165,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(93,202,165,0.025) 1px, transparent 1px);
  background-size:5vw 5vw;
}

/* שמאל */
.left {
  position:relative; z-index:5;
  display:flex; flex-direction:column; gap:3vh;
  flex:1; padding-left:2vw;
}
.brand-name {
  font-size:clamp(40px,6vw,100px); font-weight:900; color:white; line-height:1;
}
.brand-name span { color:#5DCAA5; }
.brand-tag {
  font-size:clamp(14px,1.8vw,28px); font-weight:300;
  color:rgba(255,255,255,0.5); letter-spacing:1px; margin-top:-1vh;
}
.pills { display:flex; flex-direction:column; gap:1.2vh; margin-top:1vh; }
.pill {
  display:inline-flex; align-items:center; gap:1vw;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:50px; padding:1vh 2vw;
  width:fit-content;
  font-size:clamp(13px,1.5vw,24px); color:rgba(255,255,255,0.8);
}
.pill strong { color:white; }
.pill-gold {
  background:rgba(239,159,39,0.12);
  border-color:rgba(239,159,39,0.4);
  color:#EF9F27; font-weight:900;
  font-size:clamp(18px,2.5vw,40px); letter-spacing:2px;
}

.sharon {
  margin-top:1vh;
  font-size:clamp(12px,1.2vw,20px); color:rgba(255,255,255,0.35);
}
.sharon strong { color:rgba(255,255,255,0.6); }

/* קו */
.divider {
  width:1px; height:60%; flex-shrink:0;
  background:linear-gradient(to bottom, transparent, rgba(93,202,165,0.3) 30%, rgba(93,202,165,0.3) 70%, transparent);
  margin:0 3vw;
}

/* ימין — עדן */
.right {
  position:relative; z-index:5;
  height:100%; width:30vw; flex-shrink:0;
  display:flex; align-items:flex-end; justify-content:center;
}
.right img {
  height:90%; width:auto; object-fit:contain; object-position:bottom;
  filter:brightness(1.05) drop-shadow(0 0 3vw rgba(93,202,165,0.2));
  mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.2) 4%, black 14%);
  -webkit-mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.2) 4%, black 14%);
}
</style>
</head>
<body>
<div class="scene">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>
  <div class="grid"></div>

  <div class="left">
    <div>
      <div class="brand-name"><span>נתיב</span></div>
      <div class="brand-tag">הכסף החכם שלך</div>
    </div>
    <div class="pills">
      <div class="pill">📅 <span><strong>מפגש 1</strong> מתוך 3</span></div>
      <div class="pill">💡 <span>מושגי יסוד בשוק ההון</span></div>
      <div class="pill pill-gold">⏰ 19:30</div>
    </div>
    <div class="sharon">מנחה: <strong>שרון חכמון</strong></div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <img src="screenshots/eden.png" alt="עדן">
  </div>
</div>
</body>
</html>
