<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      background: #f0e8d5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 900px;
      height: 500px;
      background: linear-gradient(145deg, #FEFAF4 60%, #f5edd8);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* פס זהב בצד ימין */
    .card::before {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 8px;
      height: 100%;
      background: linear-gradient(to bottom, #8B6914, #C49A2A, #8B6914);
    }

    /* תמונת שרון */
    .photo-side {
      width: 320px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(254,250,244,0.95), transparent);
    }

    /* תוכן */
    .content-side {
      flex: 1;
      padding: 50px 50px 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      direction: rtl;
      text-align: right;
    }

    .top-content {}

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-row img {
      height: 50px;
      object-fit: contain;
    }

    .name {
      font-size: 38px;
      font-weight: 900;
      color: #8B6914;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 17px;
      color: #B8860B;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(to left, #8B6914, #F2A7BE);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 18px;
      color: #444;
      font-weight: 400;
      line-height: 1.7;
    }

    .tagline strong {
      color: #8B6914;
      font-weight: 700;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cta-badge {
      background: linear-gradient(135deg, #8B6914, #C49A2A);
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 50px;
      letter-spacing: 0.3px;
    }

    .logos-bottom {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .logos-bottom img {
      height: 44px;
      object-fit: contain;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="photo-side">
      <img src="eden-server/public/sharon.jpeg" alt="שרון חכמון">
      <div class="photo-overlay"></div>
    </div>

    <div class="content-side">
      <div class="top-content">
        <div class="name">שרון חכמון</div>
        <div class="subtitle">כלכלנית | 25 שנות ניסיון פיננסי</div>
        <div class="divider"></div>
        <div class="tagline">
          מלווה פיננסית לנשים.
        </div>
      </div>

      <div class="contact-row" style="font-size:15px; color:#555; margin-bottom:16px; display:flex; flex-direction:column; gap:4px;">
        <span>054-562-9181</span>
        <span>sharon.hacmon@gmail.com</span>
      </div>
      <div class="bottom-row">
        <div class="cta-badge">לכרטיס הביקור שלי ←</div>
        <div class="logos-bottom">
          <img src="עיצוב/מעגל פיננסי - לוגו.png" alt="המעגל הפיננסי">
          <img src="../לוגו/Picture1.png" alt="שרון חכמון">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
