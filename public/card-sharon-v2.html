  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'Heebo', sans-serif;
      direction: rtl;
      background: #FEFAF4;
    }

    /* ── תמונה ── */
    .photo-wrap {
      width: 100%;
      height: 72vw;
      max-height: 380px;
      overflow: hidden;
      position: relative;
    }
    .photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
    }
    .photo-wrap::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, #FEFAF4, transparent);
    }
    .gold-stripe {
      position: absolute; top: 0; right: 0;
      width: 6px; height: 100%;
      background: linear-gradient(to bottom, #8B6914, #C49A2A, #8B6914);
    }

    /* ── תוכן ── */
    .content {
      padding: 4px 24px 36px;
    }

    .name {
      font-size: 32px;
      font-weight: 900;
      color: #8B6914;
      margin-bottom: 3px;
    }
    .subtitle {
      font-size: 14px;
      color: #B8860B;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(to left, #8B6914, #F2A7BE);
      border-radius: 2px;
      margin-bottom: 14px;
    }
    .tagline {
      font-size: 15px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .tagline strong { color: #8B6914; }

    /* ── כפתורי קשר ── */
    .contacts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #3a2a00;
      background: rgba(139,105,20,0.07);
      border: 1px solid rgba(139,105,20,0.15);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:active { background: rgba(139,105,20,0.18); }
    .btn-icon { font-size: 17px; flex-shrink: 0; }

    /* ── כפתור ראשי ── */
    .btn-main {
      display: block;
      text-align: center;
      text-decoration: none;
      background: linear-gradient(135deg, #8B6914 0%, #C49A2A 100%);
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 50px;
      margin-bottom: 22px;
      box-shadow: 0 4px 18px rgba(139,105,20,0.32);
      cursor: pointer;
    }
    .btn-main:active { opacity: 0.88; }

    /* ── לוגואים ── */
    .logos {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      padding-top: 18px;
      border-top: 1px solid rgba(139,105,20,0.15);
    }
    .logos img { height: 36px; object-fit: contain; opacity: 0.75; }
  </style>
</head>
