<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עוד חצי שעה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Heebo',sans-serif;
  background:#111;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
.card {
  width:480px; height:560px;
  background:linear-gradient(160deg,#062e24 0%,#085041 55%,#0d6b57 100%);
  border-radius:28px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}

.bg-circle1 {
  position:absolute; width:360px; height:360px; border-radius:50%;
  background:rgba(93,202,165,0.06); top:-120px; left:-100px; pointer-events:none;
}
.bg-circle2 {
  position:absolute; width:240px; height:240px; border-radius:50%;
  background:rgba(239,159,39,0.05); bottom:-40px; right:-60px; pointer-events:none;
}

.top-block {
  position:relative; z-index:10;
  text-align:center;
  padding:36px 28px 0;
  width:100%;
}
.tag {
  font-size:12px; font-weight:700; letter-spacing:3px;
  color:#5DCAA5; margin-bottom:14px;
}
.main-text {
  font-size:44px; font-weight:900; color:white;
  line-height:1.15; margin-bottom:14px;
}
.main-text span { color:#5DCAA5; }

.time-pill {
  display:inline-block;
  background:rgba(239,159,39,0.15);
  border:1.5px solid rgba(239,159,39,0.5);
  border-radius:50px; padding:10px 28px;
  font-size:26px; font-weight:900; color:#EF9F27;
  letter-spacing:1px;
}

.eden-wrap {
  position:relative; z-index:5;
  width:200px; flex-shrink:0;
}
.eden-wrap img {
  width:100%; display:block;
  filter:brightness(1.05) drop-shadow(0 0 20px rgba(93,202,165,0.2));
  mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.1) 5%, black 18%);
  -webkit-mask-image:linear-gradient(to top, transparent 0%, rgba(0,0,0,0.1) 5%, black 18%);
}

.bottom-bar {
  position:relative; z-index:10;
  width:100%; text-align:center;
  padding:0 28px 26px;
  font-size:14px; color:rgba(255,255,255,0.4);
}
.bottom-bar strong { color:#5DCAA5; font-weight:700; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>

  <div class="top-block">
    <div class="tag">נתיב · הכסף החכם שלך</div>
    <div class="main-text">מחכה לכן<br><span>עוד חצי שעה.</span></div>
    <div class="time-pill">⏰ 19:30</div>
  </div>

  <div class="eden-wrap">
    <img src="screenshots/eden.png" alt="עדן">
  </div>

  <div class="bottom-bar">מצטרפות בקישור שמצורף 👇 — <strong>שרון</strong></div>
</div>
</body>
</html>
