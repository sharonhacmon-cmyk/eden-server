<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    background: #062e24;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    width: 90vmin;
    height: 90vmin;
    background: linear-gradient(160deg, #062e24 0%, #085041 55%, #0d6b57 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5% 8%;
    position: relative;
    overflow: hidden;
    text-align: center;
    gap: 3vmin;
  }

  /* עיגולי רקע */
  .card::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: #1D9E75;
    opacity: 0.06;
    top: -200px; right: -150px;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #EF9F27;
    opacity: 0.07;
    bottom: -120px; left: -100px;
  }

  .tag {
    display: inline-block;
    background: rgba(239,159,39,0.18);
    border: 1px solid rgba(239,159,39,0.4);
    color: #FAC775;
    font-size: 14px;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 30px;
    letter-spacing: 0.5px;
    z-index: 2;
  }

  .logo-wrap {
    z-index: 2;
  }

  h1 {
    font-size: 6vmin;
    font-weight: 900;
    color: white;
    line-height: 1.15;
    letter-spacing: -1px;
    z-index: 2;
  }
  h1 span { color: #EF9F27; }

  .sub {
    font-size: 2.2vmin;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    line-height: 1.5;
    z-index: 2;
  }

  .details {
    display: flex;
    gap: 20px;
    justify-content: center;
    z-index: 2;
  }
  .detail {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 10px 18px;
    text-align: center;
    min-width: 90px;
  }
  .detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #5DCAA5;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-val {
    font-size: 15px;
    font-weight: 700;
    color: white;
  }

  .free-badge {
    position: absolute;
    top: 24px;
    right: 24px;
    background: #EF9F27;
    color: #062e24;
    font-size: 13px;
    font-weight: 900;
    padding: 7px 18px;
    border-radius: 30px;
    z-index: 3;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="free-badge">חינמי לחלוטין ✦</div>

  <div class="tag">וובינר · 21 באפריל 2026</div>

  <div class="logo-wrap">
    <svg width="110" height="110" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <circle cx="250" cy="250" r="250" fill="#085041"/>
      <circle cx="250" cy="250" r="220" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.4"/>
      <path d="M 120 340 Q 160 280 210 240 Q 260 200 310 170 Q 350 148 390 130" fill="none" stroke="#5DCAA5" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
      <circle cx="120" cy="340" r="9" fill="#9FE1CB" opacity="0.6"/>
      <circle cx="210" cy="240" r="10" fill="#5DCAA5" opacity="0.8"/>
      <circle cx="310" cy="170" r="11" fill="#1D9E75"/>
      <circle cx="390" cy="130" r="16" fill="#EF9F27"/>
      <circle cx="390" cy="130" r="9" fill="#FAC775"/>
      <text x="250" y="400" font-family="'Trebuchet MS', cursive, sans-serif" font-size="78" font-weight="700" fill="#E1F5EE" text-anchor="middle" dominant-baseline="central" letter-spacing="6">נתיב</text>
      <text x="250" y="452" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="400" fill="#EF9F27" text-anchor="middle" dominant-baseline="central" letter-spacing="1">הכסף החכם שלך</text>
    </svg>
  </div>

  <h1>הכירי את <span>עדן</span> —<br>המדריכה שלך</h1>

  <p class="sub">ללמוד פיננסים בלי דאגה, בלי לחץ — בשפה שלך.</p>

  <div class="details">
    <div class="detail">
      <div class="detail-label">תאריך</div>
      <div class="detail-val">21/04/2026</div>
    </div>
    <div class="detail">
      <div class="detail-label">שעה</div>
      <div class="detail-val">19:30</div>
    </div>
    <div class="detail">
      <div class="detail-label">כניסה</div>
      <div class="detail-val">חינמית</div>
    </div>
  </div>
</div>
</body>
</html>
