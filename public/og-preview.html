<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Heebo', Arial, sans-serif;
    overflow: hidden;
    background: #062e24;
  }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #062e24 0%, #085041 55%, #0d6b57 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }
  /* circles */
  .card::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #1D9E75;
    opacity: 0.07;
    top: -180px; left: -120px;
  }
  .card::after {
    content: '';
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: #EF9F27;
    opacity: 0.08;
    bottom: -100px; right: 400px;
  }

  .left {
    flex: 1;
    z-index: 2;
  }

  .tag {
    display: inline-block;
    background: rgba(239,159,39,0.18);
    border: 1px solid rgba(239,159,39,0.4);
    color: #FAC775;
    font-size: 18px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 30px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  h1 {
    font-size: 64px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }
  h1 span { color: #EF9F27; }

  .sub {
    font-size: 24px;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    line-height: 1.5;
    max-width: 520px;
    margin-bottom: 36px;
  }

  .details {
    display: flex;
    gap: 28px;
  }
  .detail {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 14px 22px;
    text-align: center;
  }
  .detail-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #5DCAA5;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .detail-val {
    font-size: 18px;
    font-weight: 700;
    color: white;
  }

  .right {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    margin-right: 20px;
  }

  .eden-circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .logo {
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: 3px;
    text-align: center;
  }
  .logo-sub {
    font-size: 13px;
    color: #EF9F27;
    font-weight: 400;
    letter-spacing: 1px;
    text-align: center;
  }

  /* free badge */
  .free-badge {
    position: absolute;
    top: 36px;
    left: 50px;
    background: #EF9F27;
    color: #062e24;
    font-size: 16px;
    font-weight: 900;
    padding: 8px 22px;
    border-radius: 30px;
    letter-spacing: 0.5px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="free-badge">חינמי לחלוטין ✦</div>

  <div class="left">
    <div class="tag">וובינר · 21 באפריל</div>
    <h1>הכירי את<br><span>עדן</span> —<br>המדריכה שלך</h1>
    <p class="sub">ללמוד פיננסים בלי דאגה, בלי לחץ — בשפה שלך.</p>
    <div class="details">
      <div class="detail">
        <div class="detail-label">תאריך</div>
        <div class="detail-val">21/04/2026</div>
      </div>
      <div class="detail">
        <div class="detail-label">שעה</div>
        <div class="detail-val">19:30</div>
      </div>
      <div class="detail">
        <div class="detail-label">כניסה</div>
        <div class="detail-val">חינמית</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="eden-circle">
      <svg width="220" height="220" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <circle cx="250" cy="250" r="250" fill="#085041"/>
        <circle cx="250" cy="250" r="220" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.4"/>
        <path d="M 120 340 Q 160 280 210 240 Q 260 200 310 170 Q 350 148 390 130" fill="none" stroke="#5DCAA5" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
        <circle cx="120" cy="340" r="9" fill="#9FE1CB" opacity="0.6"/>
        <circle cx="210" cy="240" r="10" fill="#5DCAA5" opacity="0.8"/>
        <circle cx="310" cy="170" r="11" fill="#1D9E75"/>
        <circle cx="390" cy="130" r="16" fill="#EF9F27"/>
        <circle cx="390" cy="130" r="9" fill="#FAC775"/>
        <text x="250" y="400" font-family="'Trebuchet MS', cursive, sans-serif" font-size="78" font-weight="700" fill="#E1F5EE" text-anchor="middle" dominant-baseline="central" letter-spacing="6">נתיב</text>
        <text x="250" y="452" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="400" fill="#EF9F27" text-anchor="middle" dominant-baseline="central" letter-spacing="1">הכסף החכם שלך</text>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
